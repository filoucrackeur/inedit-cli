# Fichier de configuration .conf - Format classique Unix/Linux
# Plus simple, souvent sans sections explicites

# ============================================
# CONFIGURATION SYSTEME
# ============================================

# Nom de l'application
APP_NAME=MonService
APP_VERSION=2.1.0

# Mode de fonctionnement (production/development)
MODE=production

# Chemins
DATA_DIR=/var/lib/monservice
LOG_DIR=/var/log/monservice
CONFIG_DIR=/etc/monservice

# ============================================
# SERVEUR
# ============================================

# Adresse et port
SERVER_HOST=0.0.0.0
SERVER_PORT=8443

# Configuration SSL
SSL_ENABLED=true
SSL_CERT=/etc/ssl/certs/server.crt
SSL_KEY=/etc/ssl/private/server.key

# Timeouts (en secondes)
CONNECT_TIMEOUT=30
READ_TIMEOUT=60
WRITE_TIMEOUT=60

# ============================================
# BASE DE DONNEES
# ============================================

# Type de base (mysql, postgresql, sqlite)
DB_TYPE=postgresql

# Connexion principale
DB_HOST=localhost
DB_PORT=5432
DB_NAME=production_db
DB_USER=app_user
DB_PASSWORD=supersecret

# Pool de connexions
DB_POOL_MIN=5
DB_POOL_MAX=20
DB_POOL_TIMEOUT=10

# Options avancees
DB_SSL_MODE=require
DB_CHARSET=utf8mb4

# ============================================
# CACHE
# ============================================

CACHE_ENABLED=true
CACHE_BACKEND=redis
CACHE_HOST=localhost
CACHE_PORT=6379
CACHE_DB=0
CACHE_TTL=300
CACHE_PREFIX=app:

# ============================================
# JOURNALISATION
# ============================================

# Niveau de log (trace, debug, info, warn, error)
LOG_LEVEL=info

# Sorties de log
LOG_TO_FILE=true
LOG_TO_STDOUT=false
LOG_TO_SYSLOG=false

# Rotation des fichiers
LOG_MAX_SIZE=100M
LOG_MAX_FILES=10
LOG_COMPRESS=true

# ============================================
# SECURITE
# ============================================

# Authentification
AUTH_ENABLED=true
AUTH_METHOD=jwt
JWT_SECRET=your-secret-key-here
JWT_ALGORITHM=HS256
JWT_EXPIRY=3600

# API Keys
API_KEY_ENABLED=true
API_KEY_HEADER=X-API-Key

# CORS
CORS_ENABLED=true
CORS_ORIGINS=https://example.com,https://api.example.com
CORS_METHODS=GET,POST,PUT,DELETE
CORS_HEADERS=Content-Type,Authorization

# Rate limiting
RATE_LIMIT_ENABLED=true
RATE_LIMIT_REQUESTS=100
RATE_LIMIT_WINDOW=60

# ============================================
# FONCTIONNALITES
# ============================================

# Features actives/desactives
FEATURE_ANALYTICS=true
FEATURE_WEBHOOKS=true
FEATURE_EXPORT=true
FEATURE_IMPORT=false

# Limites
MAX_UPLOAD_SIZE=52428800
MAX_EXPORT_ROWS=100000

# ============================================
# SUPERVISION
# ============================================

# Health check
HEALTH_CHECK_ENABLED=true
HEALTH_CHECK_PATH=/health
HEALTH_CHECK_INTERVAL=30

# Metriques
METRICS_ENABLED=true
METRICS_PORT=9090
METRICS_PATH=/metrics

# ============================================
# BACKUP
# ============================================

BACKUP_ENABLED=true
BACKUP_SCHEDULE=0 2 * * *
BACKUP_PATH=/backup
BACKUP_RETENTION=30
BACKUP_COMPRESSION=true

# ============================================
# MAINTENANCE
# ============================================

MAINTENANCE_MODE=false
MAINTENANCE_MESSAGE=System upgrade in progress
ALLOWED_IPS=127.0.0.1,192.168.1.0/24

# ============================================
# VARIABLES SANS VALEUR (drapeaux)
# ============================================

# Ces variables sont presentees mais sans valeur
FLAG_DEBUG
FLAG_VERBOSE
FLAG_DRY_RUN
# FLAG_DISABLED

[notes]
# Les fichiers .conf peuvent aussi avoir des sections
# Voici des notes diverses
author=Admin Team
last_update=2024-01-15
environment=production