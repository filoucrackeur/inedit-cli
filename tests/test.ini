# Fichier de configuration complet - Format INI
# Ce fichier contient tous les cas possibles

# ============================================
# COMMENTAIRES GLOBAUX
# ============================================

# Variable globale (sans section)
app_name = MonApplication
# version = 1.0.1

[database]
# Configuration de la base de donnees
host = localhost
port = 5432
max_connections = 100
# variable commentee
# max_pool = 50
enabled = true

[server]
# Configuration du serveur
port = 8080
timeout = 30
worker_threads = 4
# worker_threads = 8
ssl_enabled = false

[cache]
ttl = 300
backend = redis

[security]
# Parametres de securite
auth_enabled = true
jwt_secret = secret-key-here

[features]
# Fonctionnalites optionnelles
feature_1 = enabled
feature_2 = disabled
# feature_3 = pending

[mail]
smtp_host = smtp.example.com
smtp_port = 587

[backup]
enabled = true
schedule = daily
path = /backup

[monitoring]
# Supervision
enabled = true
interval = 60

# ============================================
# VARIABLES SANS SECTION
# ============================================

mode = production
debug = false

# ============================================
# FIN DU FICHIER
# ============================================
